# Internal Notes for AIOS

## Rationale
This task builds the production-optimized Shizuku APK for distribution. It's a foundational task for the AIOS CI/CD pipeline and blocks all downstream testing/distribution workflows.

## Risk Factors
- **Heap pressure**: 2-core system may experience GC pauses if heap tuning is suboptimal
- **Build time variance**: CMake sequential compilation can vary ±20% based on system load
- **Reproducibility**: If gradle.properties or source changes, APK hashes will differ

## Success Metrics
- APK <4.2 MB (within budget)
- Build <240s (within time budget)
- Zero errors in aapt/jarsigner validation
- All artifacts pushed to GitHub

## Related Tasks
- `build_shizuku_debug_*`: Faster dev variant (skip minification)
- `test_shizuku_apk_*`: Functional testing on devices
- `optimize_proguard_rules_*`: Rule tuning to improve build time

## Handoff
Upon success, this task hands off to TestRunner-APK for functional verification.
Upon failure, escalate to CodeOptimizer-Shizuku or Ops depending on root cause.

